name: Byttehjelpen
options:
  bundleIdPrefix: no.bjarne
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  ByttehjelpenKit:
    path: ByttehjelpenKit

targets:

  Byttehjelpen:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: ByttehjelpenKit
      - target: ByttehjelpenWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.bjarne.byttehjelpen
        DEVELOPMENT_TEAM: 2LDD6W7DC5
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Byttehjelpen.entitlements
        DEVELOPMENT_ASSET_PATHS: "\"App/Preview Content\""
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Byttehjelpen
        CFBundleDevelopmentRegion: nb
        CFBundleLocalizations: [nb]
        LSApplicationCategoryType: public.app-category.sports
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        UIBackgroundModes:
          - remote-notification
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSUserActivityTypes: []
        NSUbiquitousContainers:
          iCloud.no.bjarne.byttehjelpen:
            NSUbiquitousContainerIsDocumentScopePublic: false
            NSUbiquitousContainerName: Byttehjelpen
            NSUbiquitousContainerSupportedFolderLevels: Any

  ByttehjelpenWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: ByttehjelpenKit
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.bjarne.byttehjelpen.widget
        DEVELOPMENT_TEAM: 2LDD6W7DC5
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Byttehjelpen Widgets
        CFBundleDevelopmentRegion: nb
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
